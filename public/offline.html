<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Mateo Dueñas</title>
  <link rel="icon" type="image/svg+xml" href="/bow-and-arrow.svg" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }

    .site-name {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      line-height: 1.3;
    }

    .message {
      margin-bottom: 0.75rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .message-secondary {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .retry-button {
      display: inline-block;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .site-name {
        font-size: 1.5rem;
      }

      .message {
        font-size: 1.1rem;
      }

      .icon {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F310;</div>
    <h1 class="site-name">Mateo Dueñas</h1>
    <p class="message">You're offline</p>
    <p class="message">No tienes conexión</p>
    <p class="message-secondary">
      Please check your internet connection and try again.<br />
      Por favor, verifica tu conexión a internet e intenta de nuevo.
    </p>
    <button class="retry-button" onclick="window.location.reload()">
      Retry / Reintentar
    </button>
  </div>
</body>
</html>
